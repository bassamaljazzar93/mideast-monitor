<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#050a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ME Monitor">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>رصد الشرق الأوسط</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #050a0f;
      --surface: #0a1520;
      --surface2: #0f1e2e;
      --border: #1a3045;
      --border-bright: #1e4060;
      --accent: #dc2626;
      --accent2: #ef4444;
      --accent-glow: rgba(220, 38, 38, 0.3);
      --teal: #0891b2;
      --teal-dim: #0e7490;
      --text: #e2e8f0;
      --text-dim: #64748b;
      --text-muted: #334155;
      --amber: #d97706;
      --green: #16a34a;
      --green-bright: #22c55e;
      --font-ar: 'Cairo', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ar);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ─── SCANLINE OVERLAY ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.05) 2px,
        rgba(0,0,0,0.05) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ─── HEADER ─── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 10px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent-glow);
      animation: pulse-dot 1.5s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.8); }
    }

    .app-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text);
    }

    .app-subtitle {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 2px;
    }

    .header-stats {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .stat-chip {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-chip .num {
      color: var(--accent2);
      font-weight: 700;
    }

    .stat-chip.live {
      border-color: var(--accent);
      color: var(--accent2);
      animation: border-pulse 2s ease-in-out infinite;
    }

    @keyframes border-pulse {
      0%, 100% { border-color: var(--accent); box-shadow: 0 0 5px var(--accent-glow); }
      50% { border-color: var(--accent2); box-shadow: 0 0 12px var(--accent-glow); }
    }

    .header-right {
      display: flex;
      gap: 8px;
    }

    .btn-icon {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      width: 34px; height: 34px;
      border-radius: 4px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      transition: all 0.2s;
    }

    .btn-icon:hover, .btn-icon.active {
      border-color: var(--accent);
      color: var(--accent2);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    .btn-icon.notify-on {
      border-color: var(--green-bright);
      color: var(--green-bright);
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.3);
    }

    /* ─── MAIN LAYOUT ─── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ─── MAP ─── */
    #map {
      flex: 1;
      background: var(--bg);
    }

    .leaflet-container {
      background: #060e17 !important;
    }

    /* Dark map tiles override */
    .leaflet-tile {
      filter: brightness(0.6) saturate(0.4) hue-rotate(180deg) invert(0.85);
    }

    /* ─── SIDEBAR ─── */
    .sidebar {
      width: 320px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-title {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .last-update {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
    }

    /* Filter bar */
    .filter-bar {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: var(--font-ar);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: rgba(220, 38, 38, 0.15);
      border-color: var(--accent);
      color: var(--accent2);
    }

    .filter-btn:hover {
      border-color: var(--border-bright);
      color: var(--text);
    }

    /* Events list */
    .events-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .events-list::-webkit-scrollbar { width: 4px; }
    .events-list::-webkit-scrollbar-track { background: var(--bg); }
    .events-list::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

    .event-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 12px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .event-card::before {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .event-card:hover::before,
    .event-card.active::before { opacity: 1; }

    .event-card:hover {
      border-color: var(--border-bright);
      background: rgba(15, 30, 46, 0.9);
      transform: translateX(-2px);
    }

    .event-card.active {
      border-color: var(--accent);
      background: rgba(220, 38, 38, 0.08);
    }

    .event-card.new {
      animation: card-flash 0.5s ease-out;
    }

    @keyframes card-flash {
      0% { background: rgba(220, 38, 38, 0.2); border-color: var(--accent); }
      100% { background: var(--surface2); border-color: var(--border); }
    }

    .event-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .event-location {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 600;
      color: var(--teal);
    }

    .event-time {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
    }

    .event-title {
      font-size: 12px;
      line-height: 1.5;
      color: var(--text);
      margin-bottom: 6px;
    }

    .event-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .event-source {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
    }

    .event-type-badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 2px;
      font-family: var(--font-mono);
    }

    .badge-conflict { background: rgba(220,38,38,0.2); color: #fca5a5; border: 1px solid rgba(220,38,38,0.4); }
    .badge-military { background: rgba(217,119,6,0.2); color: #fcd34d; border: 1px solid rgba(217,119,6,0.4); }
    .badge-diplomatic { background: rgba(8,145,178,0.2); color: #67e8f9; border: 1px solid rgba(8,145,178,0.4); }
    .badge-civil { background: rgba(22,163,74,0.2); color: #86efac; border: 1px solid rgba(22,163,74,0.4); }

    /* Loading state */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(5, 10, 15, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 1000;
    }

    .loading-overlay.hidden { display: none; }

    .radar-anim {
      width: 60px; height: 60px;
      position: relative;
    }

    .radar-ring {
      position: absolute;
      inset: 0;
      border: 2px solid var(--accent);
      border-radius: 50%;
      animation: radar-expand 2s ease-out infinite;
    }

    .radar-ring:nth-child(2) { animation-delay: 0.7s; }
    .radar-ring:nth-child(3) { animation-delay: 1.4s; }

    @keyframes radar-expand {
      0% { transform: scale(0.2); opacity: 1; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    .loading-text {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 2px;
    }

    /* ─── MAP POPUP CUSTOM ─── */
    .leaflet-popup-content-wrapper {
      background: var(--surface2) !important;
      border: 1px solid var(--border-bright) !important;
      border-radius: 4px !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6) !important;
      color: var(--text) !important;
    }

    .leaflet-popup-tip-container { display: none; }

    .popup-content {
      padding: 4px 2px;
      max-width: 260px;
    }

    .popup-location {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--teal);
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .popup-title {
      font-size: 12px;
      line-height: 1.5;
      color: var(--text);
      margin-bottom: 8px;
      direction: rtl;
    }

    .popup-meta {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
    }

    .popup-link {
      font-size: 11px;
      color: var(--accent2);
      text-decoration: none;
      display: block;
      margin-top: 6px;
      border-top: 1px solid var(--border);
      padding-top: 6px;
    }

    .popup-link:hover { color: var(--text); }

    /* ─── CUSTOM MARKERS ─── */
    .custom-marker {
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 2px solid;
      position: relative;
      animation: marker-pulse 2s ease-in-out infinite;
    }

    .custom-marker::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1px solid;
      opacity: 0.3;
      animation: marker-ring 2s ease-out infinite;
    }

    @keyframes marker-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    @keyframes marker-ring {
      0% { transform: scale(1); opacity: 0.4; }
      100% { transform: scale(2); opacity: 0; }
    }

    /* ─── BOTTOM STATUS BAR ─── */
    .status-bar {
      padding: 6px 14px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .status-text {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
    }

    .status-right {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .progress-bar {
      width: 80px; height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 1px;
      width: 0%;
      transition: width 0.3s;
    }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      padding: 32px 16px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ─── NOTIFICATION TOAST ─── */
    .toast {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: var(--surface2);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 12px;
      color: var(--text);
      z-index: 10000;
      opacity: 0;
      transition: all 0.3s;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(220, 38, 38, 0.3);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ─── MOBILE RESPONSIVE ─── */
    @media (max-width: 768px) {
      .main { flex-direction: column; }
      .sidebar {
        width: 100%;
        height: 45vh;
        border-right: none;
        border-top: 1px solid var(--border);
        order: 2;
      }
      #map { order: 1; height: 55vh; }
      .header-stats { display: none; }
      .app-subtitle { display: none; }
    }

    @media (max-width: 480px) {
      .sidebar { height: 40vh; }
      #map { height: 60vh; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="logo-dot"></div>
      <div>

        <div class="app-subtitle">MIDDLE EAST MONITOR</div>
      </div>
    </div>
    <div class="header-stats">
      <div class="stat-chip live">🔴 <span id="liveCount" class="num">—</span> حدث</div>
      <div class="stat-chip">⏱ تحديث <span id="nextUpdate" class="num">5:00</span></div>
    </div>
    <div class="header-right">
      <button class="btn-icon" id="notifyBtn" title="الإشعارات" onclick="toggleNotifications()">🔔</button>
      <button class="btn-icon" id="refreshBtn" title="تحديث" onclick="fetchEvents()">⟳</button>
      <button class="btn-icon" id="installBtn" title="تثبيت التطبيق" onclick="installApp()" style="display:none">📲</button>
    </div>
  </header>

        <button class="filter-btn" data-filter="civil" onclick="setFilter('civil')">مدني</button>
      </div>

      <div class="events-list" id="eventsList">
        <div class="empty-state">جاري تحميل الأحداث...</div>
      </div>
    </div>
  </div>

    <div class="status-right">

      <span class="status-text" id="coordsDisplay">MIDEAST REGION</span>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  const TYPE_KEYWORDS = {

  // ─────────────────────────────────────────────
  // LOCATION DETECTION
  // ─────────────────────────────────────────────
  function detectLocation(text) {
    if (!text) return null;
    const lower = text.toLowerCase();
    // Sort by key length desc to match more specific names first
    const keys = Object.keys(LOCATIONS).sort((a, b) => b.length - a.length);
    for (const key of keys) {
      if (lower.includes(key.toLowerCase())) {
        return { ...LOCATIONS[key], matchKey: key };
      }
    }
    return null;
  }

  function detectType(text) {
    if (!text) return 'civil';
    const lower = text.toLowerCase();
    for (const [type, keywords] of Object.entries(TYPE_KEYWORDS)) {
      if (keywords.some(kw => lower.includes(kw))) return type;
    }
    return 'civil';
  }

  // ─────────────────────────────────────────────
  // GDELT FETCH
  // ─────────────────────────────────────────────
  const RSS_FEEDS = [
    { url: 'https://www.aljazeera.net/xml/rss/all.xml', name: 'الجزيرة' },
    { url: 'https://feeds.bbcarabic.com/bbcarabic/world/rss.xml', name: 'BBC عربي' },
    { url: 'https://feeds.skynewsarabia.com/web/rss/2036.xml', name: 'Sky News' },
    { url: 'https://arabic.rt.com/rss/', name: 'RT عربي' },
    { url: 'https://rss.nytimes.com/services/xml/rss/nyt/MiddleEast.xml', name: 'NYT' },
  ];

  const PROXIES = [
    u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
    u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  ];

  async function fetchWithProxy(feedUrl) {
    for (const proxy of PROXIES) {
      try {
        const res = await fetch(proxy(feedUrl), { signal: AbortSignal.timeout(8000) });
        if (!res.ok) continue;
        let text;
        try { const j = await res.json(); text = j.contents || ''; } catch(e) { text = await res.text(); }
        if (text && text.includes('<item>')) return text;
      } catch(e) { continue; }
    }
    return null;
  }

  function parseRSS(xmlText, sourceName) {
    try {
      const parser = new DOMParser();
      const doc = parser.parseFromString(xmlText, 'text/xml');
      const items = doc.querySelectorAll('item');
      const articles = [];
      items.forEach(item => {
        const title = item.querySelector('title')?.textContent?.trim() || '';
        const link = item.querySelector('link')?.textContent?.trim() ||
                     item.querySelector('guid')?.textContent?.trim() || '#';
        const pubDate = item.querySelector('pubDate')?.textContent?.trim() || new Date().toUTCString();
        const desc = item.querySelector('description')?.textContent?.trim() || '';
        if (title && title.length > 5) articles.push({ title, url: link, domain: sourceName, pubDate, description: desc });
      });
      return articles;
    } catch(e) { return []; }
  }

  async function fetchEvents() {
    setStatus('جاري تحميل الأخبار...');
    document.getElementById('progressFill').style.width = '5%';
    document.getElementById('mapLoader').classList.remove('hidden');

    const allArticles = [];

    for (let i = 0; i < RSS_FEEDS.length; i++) {
      const feed = RSS_FEEDS[i];
      setStatus(`تحميل: ${feed.name}...`);
      const xml = await fetchWithProxy(feed.url);
      if (xml) {
        const parsed = parseRSS(xml, feed.name);
        allArticles.push(...parsed);
      }
      document.getElementById('progressFill').style.width = `${5 + (i + 1) * 18}%`;
    }

    document.getElementById('progressFill').style.width = '95%';

    if (allArticles.length === 0) {
      setStatus('⚠️ تعذّر الاتصال — سيعيد تلقائياً');
      document.getElementById('mapLoader').classList.add('hidden');
      resetCountdown();
      return;
    }

    processArticles(allArticles);
  }

  // ─────────────────────────────────────────────
  // TRANSLATION - MyMemory Free API
  // ─────────────────────────────────────────────
  const translationCache = JSON.parse(localStorage.getItem('txCache') || '{}');

  function isArabic(text) {
    return /[؀-ۿ]/.test(text);
  }

  async function translateText(text) {
    if (!text || isArabic(text)) return text;
    if (translationCache[text]) return translationCache[text];
    try {
      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text.slice(0, 500))}&langpair=en|ar`;
      const res = await fetch(url, { signal: AbortSignal.timeout(5000) });
      if (!res.ok) return text;
      const data = await res.json();
      const translated = data.responseData?.translatedText || text;
      if (translated && translated !== text) {
        translationCache[text] = translated;
        // Save cache (keep last 200 entries)
        const keys = Object.keys(translationCache);
        if (keys.length > 200) delete translationCache[keys[0]];
        localStorage.setItem('txCache', JSON.stringify(translationCache));
        return translated;
      }
    } catch(e) {}
    return text;
  }

  async function translateEvents(events) {
    const toTranslate = events.filter(e => !isArabic(e.title));
    if (toTranslate.length === 0) return events;
    
    setStatus(`ترجمة ${toTranslate.length} خبر...`);
    
    // Translate in batches of 5 concurrently
    for (let i = 0; i < toTranslate.length; i += 5) {
      const batch = toTranslate.slice(i, i + 5);
      await Promise.all(batch.map(async e => {
        e.titleAr = await translateText(e.title);
      }));
      document.getElementById('progressFill').style.width = 
        `${Math.min(98, 60 + (i / toTranslate.length) * 38)}%`;
    }
    return events;
  }

  async function processArticles(allArticles) {
    // Deduplicate
    const seen = new Set();
    const unique = allArticles.filter(a => {
      if (!a.title || seen.has(a.url)) return false;
      seen.add(a.url);
      return true;
    });

    // Parse & filter to Middle East
    const events = unique.map(a => {
      const loc = detectLocation(a.title) || detectLocation(a.description);
      const type = detectType(a.title + ' ' + a.description);
      const date = new Date(a.pubDate || Date.now());
      // titleAr: use original if Arabic, else will be filled by translation
      const titleAr = isArabic(a.title) ? a.title : null;
      return { ...a, loc, type, date, id: a.url, titleAr };
    }).filter(e => e.loc);

    // Sort newest first
    events.sort((a, b) => b.date - a.date);

    // Notify new events
    const newEvents = events.filter(e => !seenEvents.has(e.id));
    if (newEvents.length > 0 && allEvents.length > 0) {
      triggerNewEventNotification(newEvents.length);
    }

    events.forEach(e => seenEvents.add(e.id));
    localStorage.setItem('seenEvents', JSON.stringify([...seenEvents].slice(-500)));

    allEvents = events.slice(0, CONFIG.maxEvents);
    document.getElementById('liveCount').textContent = allEvents.length;

    // Render immediately with original titles
    renderEvents();
    renderMarkers();
    updateLastTime();
    resetCountdown();
    document.getElementById('mapLoader').classList.add('hidden');
    setStatus(`✓ ${allEvents.length} حدث — جاري الترجمة...`);

    // Then translate in background and re-render
    await translateEvents(allEvents);
    renderEvents();
    renderMarkers();

    document.getElementById('progressFill').style.width = '100%';
    setTimeout(() => document.getElementById('progressFill').style.width = '0%', 800);
    setStatus(`✓ ${allEvents.length} حدث مترجم — تحديث كل 5 دقائق`);
  }

  function timeAgo(date) {
    const diff = (Date.now() - date.getTime()) / 1000;
    if (diff < 60) return `${Math.round(diff)}ث`;
    if (diff < 3600) return `${Math.round(diff/60)}د`;
    if (diff < 86400) return `${Math.round(diff/3600)}س`;
    return `${Math.round(diff/86400)}ي`;
  }

  // ─────────────────────────────────────────────
  // RENDER EVENTS LIST
  // ─────────────────────────────────────────────
  function renderEvents() {
    const list = document.getElementById('eventsList');
    const filtered = currentFilter === 'all'
      ? allEvents
      : allEvents.filter(e => e.type === currentFilter);

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state">لا توجد أحداث في هذه الفئة</div>';
      return;
    }

    list.innerHTML = filtered.map((e, i) => `
      <div class="event-card ${!seenEvents.has(e.id + '_viewed') ? 'new' : ''}"
           onclick="focusEvent(${allEvents.indexOf(e)})"
           data-idx="${allEvents.indexOf(e)}">
        <div class="event-meta">
          <div class="event-location">📍 ${e.loc.country}</div>
          <div class="event-time">${timeAgo(e.date)} مضت</div>
        </div>
        <div class="event-title">${truncate(e.titleAr || e.title, 120)}</div>
        ${e.titleAr && e.titleAr !== e.title ? `<div class="event-source" style="font-size:10px;color:#334155;margin-top:2px;font-family:var(--font-mono)">${truncate(e.title, 80)}</div>` : ''}
        <div class="event-footer">
          <span class="event-source">${e.domain}</span>
          <span class="event-type-badge badge-${e.type}">${typeLabel(e.type)}</span>
        </div>
      </div>
    `).join('');

    // Mark as viewed
    filtered.forEach(e => seenEvents.add(e.id + '_viewed'));
  }

  // ─────────────────────────────────────────────
  // RENDER MARKERS
  // ─────────────────────────────────────────────
  const TYPE_COLORS = {
    conflict: { fill: '#dc2626', border: '#ef4444' },
    military: { fill: '#d97706', border: '#f59e0b' },
    diplomatic: { fill: '#0891b2', border: '#22d3ee' },
    civil: { fill: '#16a34a', border: '#4ade80' },
  };

  function renderMarkers() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    // Group by location to avoid overlap
    const grouped = {};
    allEvents.forEach((e, i) => {
      const key = `${e.loc.lat.toFixed(1)}_${e.loc.lng.toFixed(1)}`;
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push({ ...e, idx: i });
    });

    for (const [key, evts] of Object.entries(grouped)) {
      const e = evts[0]; // dominant event at location
      const col = TYPE_COLORS[e.type] || TYPE_COLORS.civil;
      const count = evts.length;

      const iconHtml = `
        <div style="position:relative;width:${count>1?22:16}px;height:${count>1?22:16}px">
          <div style="
            width:100%;height:100%;
            border-radius:50%;
            background:${col.fill};
            border:2px solid ${col.border};
            box-shadow:0 0 8px ${col.fill},0 0 16px ${col.fill}44;
            display:flex;align-items:center;justify-content:center;
            color:white;font-size:10px;font-weight:bold;
            animation: markerPulse 2s ease-in-out infinite;
          ">${count > 1 ? count : ''}</div>
        </div>
      `;

      const icon = L.divIcon({
        html: iconHtml,
        className: '',
        iconSize: [count > 1 ? 22 : 16, count > 1 ? 22 : 16],
        iconAnchor: [count > 1 ? 11 : 8, count > 1 ? 11 : 8],
      });

      const marker = L.marker([e.loc.lat, e.loc.lng], { icon })
        .addTo(map)
        .bindPopup(buildPopup(evts));

      marker.on('click', () => {
        highlightCard(e.idx);
      });

      markers.push(marker);
    }
  }

  function buildPopup(evts) {
    const e = evts[0];
    const othersHtml = evts.slice(1, 3).map(ev =>
      `<div style="padding:4px 0;border-top:1px solid #1a3045;font-size:11px;color:#94a3b8;">${truncate(ev.title, 70)}</div>`
    ).join('');

    return `<div class="popup-content">
      <div class="popup-location">📍 ${e.loc.country}</div>
      <div class="popup-title">${truncate(e.titleAr || e.title, 140)}</div>
      ${othersHtml}
      <div class="popup-meta">
        <span>${e.domain}</span>
        <span>${timeAgo(e.date)} مضت</span>
      </div>
      <a class="popup-link" href="${e.url}" target="_blank">فتح المصدر ↗</a>
    </div>`;
  }

  function focusEvent(idx) {
    const e = allEvents[idx];
    if (!e || !e.loc) return;
    map.flyTo([e.loc.lat, e.loc.lng], 8, { duration: 1.2 });
    document.querySelectorAll('.event-card').forEach(c => c.classList.remove('active'));
    const card = document.querySelector(`[data-idx="${idx}"]`);
    if (card) { card.classList.add('active'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
  }

  function highlightCard(idx) {
    document.querySelectorAll('.event-card').forEach(c => c.classList.remove('active'));
    const card = document.querySelector(`[data-idx="${idx}"]`);
    if (card) { card.classList.add('active'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
  }

  // ─────────────────────────────────────────────
  // FILTERS
  // ─────────────────────────────────────────────
  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === f);
    });
    renderEvents();
  }

  // ─────────────────────────────────────────────
  // NOTIFICATIONS
  // ─────────────────────────────────────────────
  async function toggleNotifications() {
    if (!('Notification' in window)) { showToast('المتصفح لا يدعم الإشعارات'); return; }

    if (notificationsEnabled) {
      notificationsEnabled = false;
      document.getElementById('notifyBtn').classList.remove('notify-on');
      showToast('🔕 تم إيقاف الإشعارات');
      return;
    }

    const perm = await Notification.requestPermission();
    if (perm === 'granted') {
      notificationsEnabled = true;
      document.getElementById('notifyBtn').classList.add('notify-on');
      showToast('🔔 الإشعارات مفعّلة');
      new Notification('رصد الشرق الأوسط 🔴', {
        body: 'ستتلقى إشعارات عند رصد أحداث جديدة',
        icon: 'icon-192.png'
      });
    } else {
      showToast('⚠️ تم رفض إذن الإشعارات');
    }
  }

  function triggerNewEventNotification(count) {
    if (!notificationsEnabled) return;
    if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({
        type: 'NOTIFY_NEW_EVENTS',
        body: `تم رصد ${count} حدث جديد في الشرق الأوسط`
      });
    } else if (Notification.permission === 'granted') {
      new Notification(`🔴 ${count} أحداث جديدة`, {
        body: 'تم رصد أحداث جديدة في الشرق الأوسط',
        icon: 'icon-192.png',
        tag: 'new-events'
      });
    }
  }

  // ─────────────────────────────────────────────
  // COUNTDOWN TIMER
  // ─────────────────────────────────────────────
  function resetCountdown() {
    clearInterval(countdownTimer);
    countdown = CONFIG.refreshInterval / 1000;
    countdownTimer = setInterval(() => {
      countdown--;
      const m = Math.floor(countdown / 60);
      const s = countdown % 60;
      document.getElementById('nextUpdate').textContent = `${m}:${String(s).padStart(2,'0')}`;
      if (countdown <= 0) { fetchEvents(); }
    }, 1000);
  }

  // ─────────────────────────────────────────────
  // HELPERS
  // ─────────────────────────────────────────────
  function setStatus(msg) {
    document.getElementById('statusText').textContent = msg;
  }

  function updateLastTime() {
    const now = new Date();
    document.getElementById('lastUpdateTime').textContent =
      `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  }

  function truncate(str, n) {
    if (!str) return '';
    return str.length > n ? str.slice(0, n) + '…' : str;
  }

  function typeLabel(t) {
    return { conflict: 'قتال', military: 'عسكري', diplomatic: 'دبلوماسي', civil: 'مدني' }[t] || t;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ─────────────────────────────────────────────
  // INIT
  // ─────────────────────────────────────────────
  initMap();
  fetchEvents();

  // Add marker pulse CSS
  const style = document.createElement('style');
  style.textContent = `@keyframes markerPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }`;
  document.head.appendChild(style);
  </script>
</body>
</html>
